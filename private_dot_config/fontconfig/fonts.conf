<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
<match target="scan">
    <test name="family">
        <string>Noto Sans Mono CJK JP</string>
    </test>
    <edit name="spacing">
        <int>100</int>
    </edit>
</match>
<match target="scan">
    <test name="family">
        <string>Do Thin</string>
    </test>
    <edit name="spacing">
        <int>100</int>
    </edit>
</match>
</fontconfig>
