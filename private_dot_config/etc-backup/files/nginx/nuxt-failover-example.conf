map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream __REPLACE__-nuxt {
	server 127.0.0.1:3000 max_fails=1 fail_timeout=15s;
}

server {
	listen 80;
	listen [::]:80;
	# see: https://developer.mozilla.org/en-US/docs/Web/Security/Defenses/Secure_Contexts
	server_name __REPLACE__.localhost;
	server_tokens off;
	root /var/www/__REPLACE__/.output/public;

	index index.html;

	access_log /var/log/nginx/__REPLACE__.access_log;
	error_log /var/log/nginx/__REPLACE__.error_log;

	location /index.html {
		try_files /not_exists @nuxt;
	}

	location / {
		try_files $uri $uri/ @nuxt;
	}

	location ~* ^/_nuxt/.* {
		error_page 418 = @nuxt;
		return 418;
	}

	location /_nuxt/ {
		error_page 418 = @nuxt;
		return 418;
	}

	location = /favicon.ico {
		access_log off; log_not_found off;

		try_files $uri @static-dev;
	}
	location = /robots.txt {
		access_log off; log_not_found off;

		try_files $uri @static-dev;
	}

	location @nuxt {
		set $suffix "";

		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header Scheme $scheme;
		proxy_set_header SERVER_PORT $server_port;
		proxy_set_header REMOTE_ADDR $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		proxy_pass http://__REPLACE__-nuxt$suffix;

		proxy_connect_timeout 30s;

		proxy_read_timeout 30s;
		proxy_send_timeout 30s;

		# Buffering off for streaming responses
		proxy_buffering off;
		add_header X-Handler "Nuxt upstream" always;

		error_page 502 503 504 = @static;
	}

	location @static {
		try_files /200.html /404.html;

		add_header X-Handler "Static fallback" always;
	}

	location @static-dev {
		root /var/www/__REPLACE__/public;

		try_files $uri $uri/ @static;

		add_header X-Handler "Static dev fallback" always;
	}

	# Deny access to hidden files
	location ~ /\. {
		deny all;
	}
}
