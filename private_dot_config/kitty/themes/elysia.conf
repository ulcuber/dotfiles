# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Kitty Elysia Theme - Pastel Pink & Gold Moe
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Cursor ──
cursor            #ff7b9c
cursor_text_color #f5ebf0

# ── Elysia Color Palette ──
foreground       #5a3d5c
background       #f5ebf0

# ── Normal Colors ──
color0           #4a3a4a      # Black
color1           #ff7b9c      # Red (Elysia Pink)
color2           #e8c97a      # Green (Gold)
color3           #e8c97a      # Yellow (Gold)
color4           #ffb8d0      # Blue (Light Pink)
color5           #c7b9ff      # Magenta (Lavender)
color6           #ff6b9c      # Cyan (Light Pink but bit saturated)
color7           #5a3d5c      # White (Text)

# ── Bright Colors ──
color8           #7a5d7c      # Bright Black
color9           #ff6b8a      # Bright Red (Urgent Pink)
color10          #f5d98a      # Bright Green (Light Gold)
color11          #f5d98a      # Bright Yellow (Light Gold)
color12          #ffd4e8      # Bright Blue (Very Light Pink)
color13          #d4c8ff      # Bright Magenta (Light Lavender)
color14          #ffd4e8      # Bright Cyan (Very Light Pink)
color15          #5a3d5c      # Bright White (Text)

# ── Selection Colors ──
selection_background #ffb8d0
selection_foreground #5a3d5c

# ── Marks ──
mark1_background #ff7b9c
mark1_foreground #ffffff
mark2_background #e8c97a
mark2_foreground #5a3d5c
mark3_background #ffb8d0
mark3_foreground #5a3d5c

# ── Window ──
background_tint 0.05

active_tab_foreground   #5a3d5c
active_tab_background   #ffb8d0
active_tab_font_style   bold-italic
inactive_tab_foreground #7a5d7c
inactive_tab_background #ffe8f0
inactive_tab_font_style normal

# ── Bell ──
visual_bell_color #ffe8f0

# ── URLs ──
url_color #e8c97a
url_style curly
